query apyTimeseries($from: DateTime!, $poolId: String!, $to: DateTime!) {
  apyTimeseries(from: $from, poolId: $poolId, to: $to) {
    data {
      value
      timestamp
    }
    from
    step
    to
  }
}

query tvlTimeseries($from: DateTime!, $poolId: String!, $to: DateTime!) {
  tvlTimeseries(from: $from, poolId: $poolId, to: $to) {
    data {
      value {
        tvlStable
        tvlTotal
      }
      timestamp
    }
    from
    step
    to
  }
}

query poolById($id: String!) {
  poolById(id: $id) {
    totalRewardsToppedUp
    createdAt
  }
}

query poolsList($limit: Int!, $offset: Int!) {
  pools(limit: $limit, offset: $offset, orderBy: createdAt_DESC) {
    id
    rewardRate
    totalRewardsToppedUp
    tvlStable
    tvlTotal
    closedAt
    closedAtBlock
    createdAt
    createdAtBlock
    capacity
  }
}

query poolEvents(
  $limit: Int!
  $offset: Int!
  $poolId: String!
  $providerId: String
  $eventTypes: [EventType!]
) {
  events(
    limit: $limit
    offset: $offset
    orderBy: timestamp_DESC
    where: { pool: { id_eq: $poolId }, providerId_eq: $providerId, eventType_in: $eventTypes }
  ) {
    id
    eventType
    txHash
    timestamp
    providerId
    amount
    blockNumber
  }
  eventsConnection(
    orderBy: id_ASC
    where: { pool: { id_eq: $poolId }, providerId_eq: $providerId, eventType_in: $eventTypes }
  ) {
    totalCount
  }
}
