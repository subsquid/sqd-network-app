name: build-server

on:
  workflow_dispatch: {}
  push:
    branches: [main, develop]
    paths:
      - 'packages/server/**'
      - 'packages/common/**'
      - 'Dockerfile'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - 'turbo.json'

env:
  PROJECT_ID: bright-meridian-316511

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Yarn
        run: corepack enable

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v4
        with:
          cache: yarn

      - name: env
        id: env
        run: |
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          if [ "$REF" = "refs/heads/main" ]; then
              echo "app_env=prod" >> $GITHUB_OUTPUT
          else
              echo "app_env=dev" >> $GITHUB_OUTPUT
          fi
        env:
          REF: ${{ github.ref }}

      - run: yarn install --immutable

      # Check compile errors before build
      - run: npx turbo tsc --filter=@subsquid/server

      - run: npx turbo build --filter=@subsquid/server

      - name: Build server image
        run: docker build --progress=plain --target server -t "gcr.io/${PROJECT_ID}/subsquid-network-app-${APP_ENV}-server:${TAG}" -t "gcr.io/${PROJECT_ID}/subsquid-network-app-${APP_ENV}-server:latest" .
        env:
          APP_ENV: ${{ steps.env.outputs.app_env }}
          TAG: ${{ steps.env.outputs.tag }}

      - name: Configure Docker
        run: echo "$GCR_KEY" | docker login -u _json_key --password-stdin https://gcr.io
        env:
          GCR_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Push server image
        run: |
          docker push "gcr.io/${PROJECT_ID}/subsquid-network-app-${APP_ENV}-server:${TAG}"
          docker push "gcr.io/${PROJECT_ID}/subsquid-network-app-${APP_ENV}-server:latest"
        env:
          APP_ENV: ${{ steps.env.outputs.app_env }}
          TAG: ${{ steps.env.outputs.tag }}

      - name: Compute elapsed time
        id: elapsed
        if: always()
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))
          echo "value=$(( elapsed / 60 )) min $(( elapsed % 60 )) sec" >> $GITHUB_OUTPUT

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.slack_webhook_url }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "title": "${{ job.status == 'success' && '✅ Deployed' || job.status == 'failure' && '❌ Failed' || '⚠️ Cancelled' }} server [${{ steps.env.outputs.app_env }}]",
                "color": "${{ job.status == 'success' && 'good' || job.status == 'failure' && 'danger' || 'warning' }}",
                "text": "${{ github.event.head_commit.message }}\n<${{ github.event.head_commit.url }}|${{ steps.env.outputs.tag }}> by ${{ github.event.head_commit.author.name }} in ${{ steps.elapsed.outputs.value }}"
              }]
            }
